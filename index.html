Body 
********************************-->

<body>

 <div class="container"> 
  <div class="content">
   <h1 class="headerstyle"> Block Breaker!!! </h1>
   <h2 class="secondheaderstyle"> Rules: </h2>
   <p class="textstyle"> Press Space to start the ball moving. <br>
                         Use arrow keys or 'a' and 'd' to move the platform left & right. <br> 
                         Try to get the ball to hit as many blocks as possible. <br>
                         One block = 1 point. <br>
                         Purple blocks are worth 5 points. <br>
                         Don't let the ball touch the ground. 
   </p>
   <p class="textstyle"> Good luck!! </p>
   <button onclick="location.href='game.html'"> Start </button>
  </div>
 </div>

</body>
